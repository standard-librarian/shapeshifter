version: "1"
title: User API Contracts
description: Contract mappings for the Echo user creation example.
header: "X-ShapeShifter-Contract"

limits:
  request_body_bytes: 65536
  response_body_bytes: 1048576

shapes:
  CreateUserV1Request:
    type: object
    additionalProperties: false
    required: [name, email]
    properties:
      name: { type: string }
      email: { type: string }

  CreateUserV2Request:
    type: object
    additionalProperties: false
    required: [full_name, contact]
    properties:
      full_name: { type: string }
      contact:
        type: object
        additionalProperties: false
        required: [email]
        properties:
          email: { type: string }

  CreateUserInternalRequest:
    type: object
    additionalProperties: false
    required: [name, email]
    properties:
      name: { type: string }
      email: { type: string }

  UserInternalResponse:
    type: object
    additionalProperties: false
    required: [internal_id, name, email]
    properties:
      internal_id: { type: string }
      name: { type: string }
      email: { type: string }

  UserV1Response:
    type: object
    additionalProperties: false
    required: [id, name, email]
    properties:
      id: { type: string }
      name: { type: string }
      email: { type: string }

  UserV2Response:
    type: object
    additionalProperties: false
    required: [id, full_name, contact]
    properties:
      id: { type: string }
      full_name: { type: string }
      contact:
        type: object
        additionalProperties: false
        required: [email]
        properties:
          email: { type: string }

endpoints:
  - path: /users
    method: POST
    summary: Create user
    description: Creates a user through either the flat v1 public contract or the nested v2 web-app contract.
    tags: [users]
    default_contract: v1
    contracts:
      - id: v1
        summary: Flat public request
        description: Original public contract. The request already matches the controller's internal shape.
        request:
          description: External v1 client request body.
          shape: CreateUserV1Request
          target_shape: CreateUserInternalRequest
          examples:
            - name: Basic v1 user
              description: Minimal valid v1 request.
              body:
                name: Alice
                email: alice@example.com
          transform:
            passthrough: true
        response:
          description: External v1 client response body.
          source_shape: UserInternalResponse
          shape: UserV1Response
          examples:
            - name: Created v1 user
              description: Successful v1 response.
              body:
                id: "123"
                name: Alice
                email: alice@example.com
          transform:
            fields:
              - from: ".internal_id"
                to: ".id"
              - from: ".name"
                to: ".name"
              - from: ".email"
                to: ".email"

      - id: v2
        summary: Nested contact request
        description: Public v2 contract used by browser clients that group contact fields.
        request:
          description: External v2 client request body.
          shape: CreateUserV2Request
          target_shape: CreateUserInternalRequest
          examples:
            - name: Basic v2 user
              description: Minimal valid v2 request.
              body:
                full_name: Alice
                contact:
                  email: alice@example.com
          transform:
            fields:
              - from: ".full_name"
                to: ".name"
              - from: ".contact.email"
                to: ".email"
        response:
          description: External v2 client response body.
          source_shape: UserInternalResponse
          shape: UserV2Response
          examples:
            - name: Created v2 user
              description: Successful v2 response.
              body:
                id: "123"
                full_name: Alice
                contact:
                  email: alice@example.com
          transform:
            fields:
              - from: ".internal_id"
                to: ".id"
              - from: ".name"
                to: ".full_name"
              - from: ".email"
                to: ".contact.email"
